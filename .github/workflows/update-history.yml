name: Auktions-Verlauf aktualisieren

on:
  # Der Zeitplan wird jetzt EXTERN von cron-job.org ausgelöst (alle 15 Min)
  # über die GitHub-API. Deshalb ist GitHubs eigener "schedule"-Cron
  # bewusst NICHT mehr aktiv - er lief unzuverlässig.
  workflow_dispatch: {}   # wird von cron-job.org (und manuell) gestartet

permissions:
  contents: write

concurrency:
  group: history-updater
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verlauf aktualisieren
        run: |
          node history-updater/update-history.js
          node history-updater/update-shards.js

      - name: Heartbeat schreiben (garantiert einen Commit pro Lauf)
        run: date -u '+%Y-%m-%dT%H:%M:%SZ' > history-updater/last-run.txt

      - name: Committen und pushen
        run: |
          git config user.name "history-bot"
          git config user.email "actions@github.com"
          git add auction-history.json shard-history.json history-updater/state.json history-updater/last-run.txt
          if git diff --staged --quiet; then
            echo "Keine Änderungen."
          else
            git commit -m "Verlauf aktualisiert ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push
          fi
